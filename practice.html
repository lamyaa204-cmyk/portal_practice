<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            background: white;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 250px;
            background: #f8f9fa;
            padding: 30px 0;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.05);
        }

        .sidebar-item {
            padding: 15px 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: #333;
            text-decoration: none;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }

        .sidebar-item:hover {
            background: #e9ecef;
            border-left-color: #5dade2;
        }

        .sidebar-item.active {
            background: #e3f2fd;
            border-left-color: #5dade2;
            color: #5dade2;
        }

        .sidebar-icon {
            font-size: 1.3em;
            color: #6c757d;
            width: 25px;
            text-align: center;
        }

        .sidebar-item.active .sidebar-icon {
            color: #5dade2;
        }

        .sidebar-text {
            font-weight: 500;
            font-size: 1em;
        }

        /* Main Content Styles */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 40px;
            font-size: 2.5em;
        }

        .practice-btn {
            padding: 20px 50px;
            font-size: 1.3em;
            font-weight: bold;
            color: white;
            background: #5dade2;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(93, 173, 226, 0.3);
            text-decoration: none;
            display: inline-block;
        }

        .practice-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(93, 173, 226, 0.4);
            background: #4a9fd5;
        }

        .practice-btn:active {
            transform: translateY(-1px);
        }

        .btn-text {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .arabic-text {
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <a href="index.html" class="sidebar-item">
            <i class="fa-solid fa-house sidebar-icon"></i>
            <span class="sidebar-text">Homepage</span>
        </a>
        <a href="practice.html" class="sidebar-item active">
            <i class="fa-solid fa-pencil sidebar-icon"></i>
            <span class="sidebar-text">Practice</span>
        </a>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="container">
            <h1>Welcome!</h1>
            <a href="practice-content.html" class="practice-btn">
                <div class="btn-text">
                    <span>PRACTICE ME</span>
                    <span class="arabic-text">تمرن معي</span>
                    <span>😊</span>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
